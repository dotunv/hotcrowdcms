{% extends 'base.html' %}

{% block body %}
<c-layouts.sidebar>
    <form id="playlistForm" method="post" action="" class="h-full flex flex-col gap-4 p-6">
        {% csrf_token %}
        <input type="hidden" name="save_settings" value="true">

        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 flex-shrink-0">
            <div>
                <nav class="flex text-sm text-gray-500 mb-1">
                    <a href="{% url 'playlists_list' %}" class="hover:text-gray-900 cursor-pointer">Playlists</a>
                    <span class="mx-2">/</span>
                    <span class="text-gray-900 font-medium">Editor</span>
                </nav>
                <div class="flex items-center gap-2">
                    <input type="text" name="name" value="{{ playlist.name }}"
                        class="text-2xl font-display font-bold text-gray-900 dark:text-white bg-transparent border-none focus:ring-0 p-0 placeholder-gray-400 max-w-xs"
                        placeholder="Untitled Playlist">
                    <span
                        class="px-2 py-0.5 rounded text-xs font-bold bg-yellow-100 text-yellow-700 uppercase tracking-wide whitespace-nowrap">
                        {{ playlist.get_status_display }}
                    </span>
                </div>
                <p class="text-muted-light dark:text-muted-dark text-sm">Last saved {{ playlist.updated_at|timesince }} ago</p>
            </div>

            <div class="flex items-center gap-3">
                <button type="button" onclick="openPreviewModal()"
                    class="px-4 py-2 bg-white dark:bg-surface-dark border border-border-light dark:border-border-dark text-gray-700 dark:text-gray-300 text-sm font-medium rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    Preview
                </button>
                <button type="submit"
                    class="inline-flex items-center px-4 py-2 bg-primary text-white text-sm font-bold rounded-xl hover:bg-secondary transition-all shadow-sm hover:shadow-md">
                    <span class="material-symbols-outlined text-lg mr-2">save</span>
                    Save Playlist
                </button>
            </div>
        </div>

        <!-- Main Content Area (3 Columns) -->
        <div class="flex gap-4 flex-1 min-h-0">

            <!-- Left: Media Library -->
            <c-playlist.media_library :media_items="media_items" :playlist="playlist" />

            <!-- Center: Sequence -->
            <c-playlist.sequence_editor :playlist="playlist" />

            <!-- Right: Settings & Preview -->
            <div class="w-80 flex flex-col gap-4 flex-shrink-0 overflow-y-auto">
                <!-- Mini Preview -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 flex-shrink-0">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-slate-900">Live Preview</h3>
                    </div>
                    <div class="aspect-video bg-black rounded-lg overflow-hidden relative group">
                        <div class="w-full h-full bg-slate-800 grid place-items-center text-white text-xs">Preview</div>
                    </div>
                </div>

                <!-- Settings -->
                <c-playlist.settings_panel :playlist="playlist" />
            </div>
        </div>
    </form>

    <!-- Modals -->
    <c-playlist.upload_modal />
    <c-playlist.preview_modal :playlist="playlist" />
    {% if saved %}
    <c-playlist.success_modal :playlist="playlist" />
    {% endif %}
</c-layouts.sidebar>
{% endblock %}

{% block extra_js %}
<script>
    function saveOrder() {
        const items = document.querySelectorAll('.sequence-item');
        const itemIds = Array.from(items).map(item => item.dataset.id);

        const formData = new FormData();
        formData.append('playlist_id', '{{ playlist.id }}');
        itemIds.forEach(id => formData.append('item', id));

        fetch('{% url "reorder_playlist" %}', {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' },
            body: formData
        });
    }

    function openPreviewModal() {
        document.getElementById('previewModal').classList.remove('hidden');
        if (window.initPreviewPlayer) window.initPreviewPlayer();
    }

    function closePreviewModal() {
        document.getElementById('previewModal').classList.add('hidden');
        if (window.stopPreviewPlayer) window.stopPreviewPlayer();
    }

    function closeSavedModal() {
        const modal = document.getElementById('savedModal');
        if (modal) modal.remove();
        const url = new URL(window.location);
        url.searchParams.delete('saved');
        window.history.replaceState({}, '', url);
    }
</script>
{% endblock %}
