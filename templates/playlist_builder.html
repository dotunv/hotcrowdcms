{% extends 'base.html' %}

{% block content %}
<div class="h-[calc(100vh-6rem)] flex flex-col">
    <!-- Top Bar -->
    <form id="playlistForm" method="post" action=""
        class="flex-none flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">
        {% csrf_token %}
        <input type="hidden" name="save_settings" value="true">

        <div>
            <div class="flex items-center gap-2 text-sm text-slate-500 mb-1">
                <a href="{% url 'playlists_list' %}" class="hover:text-slate-700">Playlists</a>
                <span>/</span>
                <span>Editor</span>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" name="name" value="{{ playlist.name }}"
                    class="text-2xl font-bold text-slate-900 bg-transparent border-none focus:ring-0 p-0 w-auto placeholder-slate-400"
                    placeholder="Untitled Playlist">

                <span
                    class="px-2 py-0.5 rounded text-xs font-bold bg-yellow-100 text-yellow-700 uppercase tracking-wide">
                    {{ playlist.get_status_display }}
                </span>

                <button type="button" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <span class="text-xs text-slate-500 hidden sm:inline-block">Last saved {{ playlist.updated_at|timesince }}
                ago</span>
            <button type="button" onclick="openPreviewModal()"
                class="px-4 py-2 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-50 transition-colors">
                Preview
            </button>
            <button type="submit"
                class="px-4 py-2 bg-green-700 text-white text-sm font-medium rounded-lg hover:bg-green-800 transition-colors shadow-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                Save Playlist
            </button>
        </div>

        <!-- Main Content Area (3 Columns) -->
        <div class="flex-1 flex gap-6 min-h-0 overflow-hidden mt-4">

            <!-- Left: Media Library -->
            <c-playlist.media_library :media_items="media_items" :playlist="playlist" />

            <!-- Center: Sequence -->
            <c-playlist.sequence_editor :playlist="playlist" />

            <!-- Right: Settings & Preview -->
            <div class="w-80 flex flex-col gap-6 flex-shrink-0">
                <!-- Mini Preview -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-slate-900">Live Preview</h3>
                        <div class="flex gap-1 text-slate-400">
                            <!-- ... (Mini preview controls, kept inline for now or could be a small component) ... -->
                            <!-- Leaving simplified here for brevity, assuming main preview is in modal -->
                        </div>
                    </div>
                    <!-- Simplified placeholder for mini preview since main logic is in modal/JS -->
                    <div class="aspect-video bg-black rounded-lg overflow-hidden relative group">
                        <div class="w-full h-full bg-slate-800 grid place-items-center text-white text-xs">Preview</div>
                    </div>
                </div>

                <!-- Settings -->
                <c-playlist.settings_panel :playlist="playlist" />
            </div>
        </div>
    </form>
</div>

<!-- Modals -->
<c-playlist.upload_modal />
<c-playlist.preview_modal :playlist="playlist" />
<c-playlist.success_modal :playlist="playlist" />

{% endblock %}

{% block extra_js %}
<script>
    // Sortable JS Init
    // (Logic moved to component or kept here if needed for global context)
    function saveOrder() {
        const items = document.querySelectorAll('.sequence-item');
        const itemIds = Array.from(items).map(item => item.dataset.id);

        const formData = new FormData();
        formData.append('playlist_id', '{{ playlist.id }}');
        itemIds.forEach(id => formData.append('item', id));

        fetch('{% url "reorder_playlist" %}', {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' },
            body: formData
        });
    }

    function openPreviewModal() {
        document.getElementById('previewModal').classList.remove('hidden');
    }

    function closePreviewModal() {
        document.getElementById('previewModal').classList.add('hidden');
    }

    function closeSavedModal() {
        const modal = document.getElementById('savedModal');
        if (modal) modal.remove(); // Or add hidden
        // Remove query param to prevent showing on refresh?
        const url = new URL(window.location);
        url.searchParams.delete('saved');
        window.history.replaceState({}, '', url);
    }
</script>
{% endblock %}
