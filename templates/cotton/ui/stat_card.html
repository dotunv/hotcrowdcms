<div
    class="bg-white dark:bg-surface-dark rounded-2xl p-6 shadow-soft border border-border-light dark:border-border-dark relative overflow-hidden group hover:shadow-card transition-shadow">
    <div class="flex justify-between items-start mb-4">
        <h3 class="text-sm font-medium text-muted-light dark:text-muted-dark">{{ label }}</h3>
        <div
            class="w-10 h-10 rounded-xl bg-{{ color|default:'gray' }}-50 dark:bg-{{ color|default:'gray' }}-900/50 flex items-center justify-center text-{{ color|default:'gray' }}-600 dark:text-{{ color|default:'gray' }}-400 group-hover:bg-{{ color|default:'gray' }}-100 transition-colors">
            <span class="material-symbols-outlined">{{ icon }}</span>
        </div>
    </div>

    <div class="flex items-baseline gap-1">
        <span class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight">{{ value }}</span>
        {% if unit %}
        <span class="text-sm text-gray-500 font-medium">{{ unit }}</span>
        {% endif %}
    </div>

    {% if trend %}
    <div class="mt-2 flex items-center text-sm font-medium {{ trend_up|yesno:'text-green-600,text-red-600' }}">
        <span class="material-symbols-outlined text-lg mr-0.5">{{ trend_up|yesno:'trending_up,trending_down' }}</span>
        {{ trend }}
        <span class="ml-2 text-gray-400 font-normal">vs last month</span>
    </div>
    {% endif %}

    {% if extra %}
    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
        {{ extra|safe }}
    </div>
    {% endif %}
</div>
