<div x-data="{ 
    isOpen: false, 
    playlistId: null, 
    playlistName: '', 
    assignedScreens: [] 
}" @open-assign-modal.window="
        isOpen = true; 
        playlistId = $event.detail.id; 
        playlistName = $event.detail.name;
        assignedScreens = $event.detail.screens;
    " class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true" x-show="isOpen"
    style="display: none;">

    <div class="fixed inset-0 bg-gray-500/75 transition-opacity" x-show="isOpen"
        x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
    </div>

    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-2xl bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg"
                @click.away="isOpen = false" x-show="isOpen" x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">

                <form method="post" action="{% url 'assign_playlist_screens' %}">
                    {% csrf_token %}
                    <input type="hidden" name="playlist_id" :value="playlistId">

                    <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
                        <div class="sm:flex sm:items-start">
                            <div
                                class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-blue-100 sm:mx-0 sm:h-10 sm:w-10">
                                <span class="material-icons-outlined text-blue-600">cast_connected</span>
                            </div>
                            <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                                <h3 class="text-lg font-semibold leading-6 text-gray-900" id="modal-title">
                                    Assign Playlist
                                </h3>
                                <div class="mt-2">
                                    <p class="text-sm text-gray-500 mb-4">
                                        Select screens to display <span class="font-bold text-gray-900"
                                            x-text="playlistName"></span>.
                                    </p>

                                    <div
                                        class="bg-gray-50 rounded-lg border border-gray-200 p-3 max-h-60 overflow-y-auto space-y-2">
                                        {% for screen in all_screens %}
                                        <label
                                            class="flex items-start gap-3 cursor-pointer hover:bg-gray-100 p-2 rounded-lg transition-colors">
                                            <input type="checkbox" name="assigned_screens" value="{{ screen.id }}"
                                                class="mt-0.5 w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary"
                                                :checked="assignedScreens.includes('{{ screen.id }}')">
                                            <div class="flex-1 min-w-0 text-left">
 <span class="block text-sm font-medium text-gray-900 truncate">{{ screen.name }}</span>
                                                <span class="block text-[10px] text-gray-500 uppercase tracking-wide">
                                                    {% if screen.is_online %}
                                                    <span class="text-green-600">Online</span>
                                                    {% else %}
                                                    <span class="text-gray-400">Offline</span>
                                                    {% endif %}
                                                </span>
                                            </div>
                                        </label>
                                        {% empty %}
                                        <p class="text-sm text-gray-500 italic text-center py-4">No screens found.</p>
                                        <div class="text-center pb-2">
                                            <a href="{% url 'setup_screen' %}"
                                                class="text-xs text-primary font-medium hover:underline">Add Screen</a>
                                        </div>
                                        {% endfor %}
                                    </div>
                                    <p class="text-[10px] text-gray-400 mt-2 text-center">
                                        Screens not selected will be unassigned from this playlist.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                        <button type="submit"
                            class="inline-flex w-full justify-center rounded-lg bg-primary px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-secondary sm:ml-3 sm:w-auto transition-colors">
                            Save Assignments
                        </button>
                        <button type="button" @click="isOpen = false"
                            class="mt-3 inline-flex w-full justify-center rounded-lg bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto transition-colors">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
