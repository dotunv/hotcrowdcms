<c-vars media_items playlist />

<div class="w-80 flex flex-col bg-white rounded-xl shadow-sm border border-slate-100 flex-shrink-0">
    <!-- Search -->
    <div class="p-3 border-b border-slate-100">
        <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" placeholder="Search media..."
                class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                hx-get="{% url 'playlist_builder' %}" hx-trigger="keyup changed delay:500ms" hx-target="#media-grid"
                hx-select="#media-grid" name="media_search">
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex px-3 gap-2 border-b border-slate-100 overflow-x-auto text-xs font-medium scrollbar-hide">
        <button type="button" class="py-2.5 px-3 text-green-700 border-b-2 border-green-700 whitespace-nowrap">All
            Media</button>
        <button type="button"
            class="py-2.5 px-3 text-slate-500 hover:text-slate-700 whitespace-nowrap">Instagram</button>
        <button type="button" class="py-2.5 px-3 text-slate-500 hover:text-slate-700 whitespace-nowrap">Video</button>
    </div>

    <!-- Media Grid -->
    <div id="media-grid" class="flex-1 overflow-y-auto p-3 scrollbar-default">
        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Recently Added</h4>

        <div id="media-library-sortable" class="grid grid-cols-2 gap-3 pb-20">
            {% for item in media_items %}
            <div class="group relative aspect-square bg-slate-100 rounded-xl overflow-hidden cursor-move border border-slate-200 hover:border-green-500 transition-all draggable-source"
                data-id="{{ item.id }}">
                {% if item.media_type == 'IMAGE' %}
                <img src="{{ item.file_url }}" class="w-full h-full object-cover pointer-events-none">
                {% else %}
                <div class="w-full h-full flex items-center justify-center bg-slate-800 text-white pointer-events-none">
                    <svg class="w-8 h-8 opacity-50" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z" />
                    </svg>
                </div>
                {% endif %}

                <!-- Duration Badge -->
                <div
                    class="absolute top-1.5 right-1.5 bg-black/60 backdrop-blur-sm text-white text-[10px] font-medium px-1.5 py-0.5 rounded pointer-events-none">
                    {{ item.duration }}s
                </div>

                <!-- Add Overlay -->
                <div
                    class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center pointer-events-none">
                    <!-- HTMX button remains for click-to-add fallback, but pointer-events handled by container for drag -->
                    <span class="text-white font-bold text-xs pointer-events-none">Drag to Add</span>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        (function () {
            var el = document.getElementById('media-library-sortable');
            if (el && !el.sortable) {
                new Sortable(el, {
                    group: {
                        name: 'shared',
                        pull: 'clone',
                        put: false
                    },
                    sort: false, // Disable sorting within library
                    animation: 150,
                    ghostClass: 'opacity-50',
                    draggable: '.draggable-source'
                });
                el.sortable = true;
            }
        })();
    </script>

    <!-- Upload Button (Fixed at bottom of sidebar) -->
    <div class="p-3 border-t border-slate-100 bg-white">
        <button type="button" onclick="document.getElementById('uploadMediaModal').classList.remove('hidden')"
            class="w-full py-2.5 bg-slate-50 border border-dashed border-slate-300 rounded-xl text-slate-600 text-sm font-medium hover:bg-slate-100 hover:border-slate-400 transition-all flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            Upload New Media
        </button>
    </div>
</div>
