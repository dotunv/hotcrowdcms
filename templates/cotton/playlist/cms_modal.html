<div id="cmsContentModal" class="hidden fixed inset-0 z-50 overflow-y-auto" x-data="{ 
        show: false,
        search: '' 
    }" @open-cms-modal.window="
        document.getElementById('cmsContentModal').classList.remove('hidden'); 
        show = true; 
        if(!document.getElementById('cms-picker-content').innerHTML.trim()) {
            htmx.ajax('GET', '{% url 'cms_content_library' %}?picker=true', {target: '#cms-picker-content'});
        }
    " @cms-selected.window="
        document.getElementById('cmsContentModal').classList.add('hidden');
        show = false;
        htmx.ajax('POST', '/add-cms/' + $event.detail.id + '/', {
            target: '#playlist-sequence-container',
            swap: 'outerHTML',
            values: { csrfmiddlewaretoken: '{{ csrf_token }}', playlist_id: '{{ playlist.id }}' }
        });
    " @keydown.escape="document.getElementById('cmsContentModal').classList.add('hidden'); show = false;">

    <div class="flex items-center justify-center min-h-screen px-4 py-8">
        <!-- Overlay -->
        <div class="fixed inset-0 bg-black/60 transition-opacity"
            @click="document.getElementById('cmsContentModal').classList.add('hidden'); show = false;"></div>

        <!-- Modal Content -->
        <div
            class="relative bg-white dark:bg-surface-dark rounded-2xl shadow-xl max-w-5xl w-full p-8 max-h-[90vh] flex flex-col">
            <!-- Close Button -->
            <button @click="document.getElementById('cmsContentModal').classList.add('hidden'); show = false;"
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors z-10">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Header -->
            <div class="mb-6 flex-shrink-0">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Add Content from CMS</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Select content created in the Store CMS to add
                    to your playlist.</p>
            </div>

            <!-- Toolbar (Search & Filter) -->
            <div class="flex gap-4 mb-4 flex-shrink-0">
                <div class="relative flex-1">
                    <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400 text-lg">search</span>
                    <input type="text" placeholder="Search content..."
                        class="w-full pl-10 pr-4 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                </div>
                <div class="flex items-center gap-2">
                    <select
                        class="px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none cursor-pointer">
                        <option value="All">All Types</option>
                        <option value="template">Templates</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
            </div>

            <!-- Content Grid Scroller -->
            <div class="overflow-y-auto flex-1 -mx-2 px-2 border-t border-gray-100 dark:border-gray-700 pt-4">
                <div id="cms-picker-content" class="min-h-[300px]">
                    <!-- Loading State -->
                    <div class="flex items-center justify-center h-64 text-gray-400">
                        <div class="flex flex-col items-center gap-3">
                            <span class="material-symbols-outlined text-4xl animate-spin">refresh</span>
                            <span>Loading CMS Content...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div
                class="flex justify-between items-center mt-6 pt-4 border-t border-gray-200 dark:border-gray-700 flex-shrink-0">
                <a href="{% url 'store_cms' %}"
                    class="text-sm text-primary font-medium hover:underline flex items-center gap-1">
                    <span class="material-symbols-outlined text-lg">add_circle</span>
                    Create New Content
                </a>
                <button @click="document.getElementById('cmsContentModal').classList.add('hidden'); show = false;"
                    class="px-5 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>
