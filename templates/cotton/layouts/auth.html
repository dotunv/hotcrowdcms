{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HotCrowd Auth{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    {% tailwind_css %}

    <style>
        .bg-pattern {
            background-color: #F9F9F7;
            background-image: radial-gradient(#057A43 0.5px, transparent 0.5px), radial-gradient(#057A43 0.5px, #F9F9F7 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.8;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark antialiased transition-colors duration-200 h-screen flex flex-col relative overflow-hidden font-body">
    <div class="absolute inset-0 z-0">
        <div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 -left-24 w-72 h-72 bg-accent/20 rounded-full blur-3xl"></div>
    </div>

    <!-- Header -->
    <header class="relative z-10 w-full p-6 md:p-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="{% static 'hotcrowd-logo.png' %}" alt="HotCrowd" class="h-10 w-auto dark:hidden">
            <img src="{% static 'hotcrowd-logo-white.png' %}" alt="HotCrowd" class="h-10 w-auto hidden dark:block">
        </div>
        <div class="hidden md:block">
            {% block extra_header %}{% endblock %}
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center relative z-10 p-4">
        {{ slot }}
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full p-6 text-center">
        <div class="flex flex-col items-center gap-4">
            <div class="flex gap-6 text-xs text-muted-light dark:text-muted-dark font-medium">
                <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
                <a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
                <a class="hover:text-primary transition-colors" href="#">Help Center</a>
            </div>
            <p class="text-xs text-gray-400 dark:text-gray-600">© 2024 HotCrowd Inc. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
