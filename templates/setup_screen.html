{% load i18n account static %}
<c-layouts.auth>
    <div
        class="w-full max-w-md bg-white dark:bg-surface-dark rounded-2xl shadow-card p-8 border border-border-light dark:border-border-dark relative overflow-hidden mx-auto">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4 text-primary">
                <span class="material-symbols-outlined text-3xl">add_to_queue</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Pair New Screen</h1>
            <p class="text-muted-light dark:text-muted-dark text-sm mt-1">Enter the 6-character code displayed on your
                TV application.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="name" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Screen
                    Name</label>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">edit</span>
                    <input type="text" name="name" id="name" required placeholder="e.g. Lobby Display"
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                </div>
            </div>

            <div>
                <label for="pairing_code" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Pairing
                    Code</label>
                <input type="text" name="pairing_code" id="pairing_code" required maxlength="6" autocomplete="off"
                    class="w-full text-center text-3xl font-mono font-bold tracking-[0.5em] uppercase py-4 border-2 border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                    placeholder="------" style="text-transform: uppercase;">
            </div>

            <button type="submit"
                class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-primary/25 text-sm font-bold text-white bg-primary hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform hover:-translate-y-0.5">
                <span class="material-symbols-outlined">link</span>
                Connect Screen
            </button>

            <div class="text-center">
                <a href="{% url 'dashboard' %}"
                    class="text-sm font-bold text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">Cancel</a>
            </div>
        </form>
    </div>
</c-layouts.auth>
