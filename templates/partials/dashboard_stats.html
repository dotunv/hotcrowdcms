<div id="dashboard-stats" class="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
    <c-ui.stat_card label="Active Screens" value="{{ online_screens }}/{{ total_screens }}" icon="monitor" color="green"
        extra='{% if new_screens_this_week > 0 %}<span class="inline-flex items-center px-2 py-1 rounded text-xs font-medium bg-green-100 dark:bg-green-900/20 text-green-800 dark:text-green-200">+{{ new_screens_this_week }} New</span> <span class="text-xs text-gray-500 ml-2">added this week</span>{% else %}<span class="text-xs text-gray-500">No new screens this week</span>{% endif %}' />

    <c-ui.stat_card label="Estimated Impressions" value="{{ impressions }}" icon="visibility"
        color="orange" trend="{{ trend }}" trend_up="{{ trend_up }}" />

    <c-ui.stat_card label="Instagram Sync" value="{% if last_sync_time %}Active{% else %}Not Synced{% endif %}" icon="center_focus_weak" color="pink"
        extra='{% if last_sync_time %}<span class="text-xs text-gray-500">Last synced {{ last_sync_time }}</span>{% else %}<span class="text-xs text-gray-500">No Instagram media synced yet</span>{% endif %}' />
</div>
