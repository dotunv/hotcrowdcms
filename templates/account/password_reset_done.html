{% load i18n account %}
<c-layouts.auth>
    <div
        class="w-full max-w-md bg-white dark:bg-surface-dark rounded-2xl shadow-card p-6 md:p-10 border border-border-light dark:border-border-dark relative overflow-hidden mx-auto">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary to-accent"></div>
        <div class="mb-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 dark:bg-green-900 mb-4">
                <span class="material-symbols-outlined text-3xl text-primary">mark_email_read</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Check Your Email</h1>
            <p class="text-muted-light dark:text-muted-dark text-sm">
                We've sent a password reset link to your email address. It expires in 24 hours.
            </p>
        </div>

        <div class="mt-6 text-center">
            <p class="text-sm text-muted-light dark:text-muted-dark">
                Didn't receive it? Check your spam folder or
                <a class="text-primary font-bold hover:text-secondary transition-colors"
                    href="{% url 'account_reset_password' %}">try again</a>.
            </p>
        </div>
    </div>
</c-layouts.auth>
