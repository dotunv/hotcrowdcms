{% load i18n %}
{% load account socialaccount %}
<c-layouts.auth>
    <div
        class="w-full max-w-md bg-white dark:bg-surface-dark rounded-2xl shadow-card p-6 md:p-10 border border-border-light dark:border-border-dark relative overflow-hidden mx-auto">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary to-accent"></div>

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">{% trans "Sign In" %}</h1>
            <p class="text-muted-light dark:text-muted-dark text-sm">
                {% blocktrans with provider.name as provider %}You are about to connect a new third party account from
                {{ provider }}.{% endblocktrans %}
            </p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <button type="submit"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-primary hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                {% trans "Continue" %}
            </button>
        </form>
    </div>
</c-layouts.auth>
