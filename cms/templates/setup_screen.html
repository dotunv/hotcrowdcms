{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white shadow-sm rounded-2xl border border-slate-100 overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100 bg-gradient-to-r from-primary/5 to-green-100/50">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-primary/10 rounded-xl">
                    <svg class="w-8 h-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-slate-900">Pair New Screen</h3>
                    <p class="text-sm text-slate-500">Enter the code displayed on your TV</p>
                </div>
            </div>
        </div>

        <div class="p-6">
            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Step Indicator -->
                <div class="flex items-center justify-center gap-2 text-sm text-slate-500 mb-6">
                    <span class="flex items-center gap-1">
                        <span
                            class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs font-medium">1</span>
                        <span class="hidden sm:inline">Turn on TV</span>
                    </span>
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                    <span class="flex items-center gap-1">
                        <span
                            class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs font-medium">2</span>
                        <span class="hidden sm:inline">Open player app</span>
                    </span>
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                    <span class="flex items-center gap-1">
                        <span
                            class="w-6 h-6 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center text-xs font-medium">3</span>
                        <span class="hidden sm:inline">Enter code</span>
                    </span>
                </div>

                <!-- Name Input -->
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-2">Screen Name</label>
                    <div class="relative">
                        <input type="text" name="name" id="name" required
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                            placeholder="e.g., Lobby TV, Storefront Display">
                        <div class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                </path>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Pairing Code Input -->
                <div>
                    <label for="pairing_code" class="block text-sm font-medium text-slate-700 mb-2">Pairing Code</label>
                    <input type="text" name="pairing_code" id="pairing_code" required maxlength="6" autocomplete="off"
                        class="w-full text-center text-3xl font-bold tracking-[0.5em] uppercase px-4 py-4 border-2 border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                        placeholder="- - - - - -" oninput="this.value = this.value.toUpperCase()">
                    <p class="text-xs text-slate-500 text-center mt-2">Enter the 6-character code shown on your screen
                    </p>
                </div>

                <!-- Actions -->
                <div class="space-y-3">
                    <button type="submit"
                        class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-base font-semibold text-white bg-primary hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1">
                            </path>
                        </svg>
                        Pair Screen
                    </button>
                    <a href="{% url 'dashboard' %}"
                        class="w-full flex justify-center py-3 px-4 border border-slate-200 rounded-xl text-base font-medium text-slate-600 bg-white hover:bg-slate-50 transition-all">
                        Cancel
                    </a>
                </div>
            </form>
        </div>

        <!-- Help Section -->
        <div class="px-6 py-4 bg-slate-50 border-t border-slate-100">
            <p class="text-xs text-slate-500 text-center">
                Need help? <a href="#" class="text-primary hover:text-green-700 font-medium">View setup guide</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
